{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Healthy Body</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="/home/">Healthy Body</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/home/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/BMI/">BMI</a></li>
        <li class="nav-item"><a class="nav-link" href="/about/">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="/contact/">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTACT FORM -->
<div class="container my-5">
    <div class="card1 shadow p-4">
        <h2 class="text-center mb-4">Contact Us</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" name="subject" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea name="message" rows="5" class="form-control" required></textarea>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Send Message</button>
            </div>
        </form>
    </div>
</div>

<!-- CONTACT INFO -->
<div class="container mb-5">
    <div class="card1 shadow p-4">
        <div class="row text-center">
            <div class="col-md-4">
                <h5>Address</h5>
                <p>Indore, Madhya Pradesh</p>
            </div>
            <div class="col-md-4">
                <h5>Email</h5>
                <p>support@healthybody.com</p>
            </div>
            <div class="col-md-4">
                <h5>Phone</h5>
                <p>+91 00000 00000</p>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
    © 2026 Healthy Body | All Rights Reserved
</footer>

</body>
</html>
