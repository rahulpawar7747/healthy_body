{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>All Diet Plans | Healthy Body</title>
    <meta charset="UTF-8">
    <title>Healthy Body</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">

    <a class="navbar-brand" href="/home/">Healthy Body</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/home/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/BMI/">BMI</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout/">Logout</a></li>
      </ul>
    </div>

  </div>
</nav>
<div class="container my-5">
          <div class="card1 mb-4 shadow"><h2>Your Diet Plan</h2>
          <pre>{{ diet.diet_text }}</pre>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <div id="diet-box"></div>
        {% if diet_markdown %}
        <div id="diet-box"></div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {
            const markdown = `{{ diet_markdown|escapejs }}`;
            document.getElementById("diet-box").innerHTML = marked.parse(markdown);
        });
        </script>
        {% else %}
        <p>No diet plan generated yet. Go to AI Planner first.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
