{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Healthy Body</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>Health Progress</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#1f2a38;
            text-align:center;
            font-size: 20px;
            /* background : url("/static/images/1234.jpg") no-repeat center center/cover;
            background-size: cover; */
        }
        h2{
            margin:30px 0;
        }
        canvas{
            max-width:10000px;
            margin:auto;
        }
        .chart-section {
        padding: 50px 20px;
        text-align: center;
        }

        .card1 {
            width: fit-content;
            margin: 0 auto 30px;
            background: rgb(255, 255, 255);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .chart-card {
            width: 85%;
            max-width: 1000px;
            height: 500px;
            margin: auto;
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #progressChart {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">

    <a class="navbar-brand" href="/home/">Healthy Body</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/home/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/BMI/">BMI</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout/">Logout</a></li>
      </ul>
    </div>

  </div>
</nav>
<body>


<section class="chart-section">
    <div class="card1">
        <h2>Your Health Progress Chart</h2>
    </div>

    <div class="chart-card">
        <canvas id="progressChart"></canvas>
    </div>
</section>
<script>
const dates = JSON.parse('{{ dates_json|escapejs }}');
const bmis = JSON.parse('{{ bmis_json|escapejs }}');
const weights = JSON.parse('{{ weights_json|escapejs }}');
const goalBmi = JSON.parse('{{ goal_bmi_json|escapejs }}');

const ctx = document.getElementById('progressChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: dates,
        datasets: [
            {
                label: 'BMI Progress',
                data: bmis,
                borderWidth: 3,
                tension: 0.3
            },
            {
                label: 'Weight Progress (kg)',
                data: weights,
                borderWidth: 3,
                tension: 0.3
            },
            {
                label: 'Goal BMI (22)',
                data: goalBmi,
                borderDash: [5,5],
                borderWidth: 2,
                tension: 0.1
            }
        ]
    },
});
</script>

</body>
</html>
