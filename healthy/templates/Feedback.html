{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>
<link rel="stylesheet" href="{% static 'css/BMI.css' %}">
</head>

<body>

<div class="container">

<h1>Feedback</h1>

<p>We value your feedback. Please share your suggestions to improve our system.</p>

<form>

<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>

<textarea placeholder="Write your feedback..." style="width:100%;height:120px;margin-top:10px;"></textarea>

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
