{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.60">
    <title>Healthy Body</title>
    <link rel="stylesheet" href="{% static 'css/BMI.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid px-4">

    <a class="navbar-brand" href="/home/">Healthy Body</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/home/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/BMI/">BMI</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout/">Logout</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="landing-page-background"></div>
<div class="container">

<form method="POST" action="{% url 'BMI' %}" class="bmi-form">
            <h1>Body Mass Index (BMI)</h1>
    {% csrf_token %}

    <input type="number" name="age" placeholder="Age">

    <div class="gender">
        <label>
            <input type="radio" name="gender" value="Male" checked> Male
        </label>
        <label>
            <input type="radio" name="gender" value="Female"> Female
        </label>
    </div>

    <input type="number" name="weight" placeholder="Weight (kg)" required>
    <input type="number" step="0.1" name="height" placeholder="Height (feet in 0.0)" required>
    <button type="submit">Calculate BMI</button>
    {% if bmi %}
        <div class="result">
            <b>BMI:</b> {{ bmi }} <br>
            <b>Status:</b> {{ status }} <br>
            <b>Age:</b> {{ age }} | <b>Gender:</b> {{ gender }}
        </div>
    {% endif %}
</form>
        <div class="result" id="result"></div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
